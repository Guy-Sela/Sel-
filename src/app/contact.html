<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: "Josefin Sans", sans-serif;
            }

            body {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding: 0 2.5rem 2rem;
            }

            nav {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                margin-bottom: 2.5rem;
            }

            nav a {
                font-size: clamp(28px, 5vw, 48px);
                font-weight: 300;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: #999;
                text-decoration: none;
                transition: color 0.3s ease;
                width: fit-content;
            }

            nav a:hover {
                color: #fff;
            }

            footer {
                font-size: 14px;
                font-weight: 300;
                letter-spacing: 0.08em;
                color: #777;
            }
        </style>
    </head>
    <body>
        <nav>
            <a href="mailto:hello@sela.com">Email</a>
            <a href="https://x.com/sela" target="_blank" rel="noopener">X</a>
            <a href="https://github.com/sela" target="_blank" rel="noopener"
                >GitHub</a
            >
        </nav>

        <footer>
            <span>© Selà <span id="year"></span></span>
        </footer>

        <script>
            document.getElementById("year").textContent =
                new Date().getFullYear();
        </script>
    </body>
</html>
