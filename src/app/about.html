<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Art & Code</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .stage {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .word {
                position: absolute;
                font-family: "Josefin Sans", sans-serif;
                font-size: clamp(48px, 10vw, 96px);
                font-weight: 300;
                color: #fff;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                mix-blend-mode: difference;
                animation-duration: 4.5s;
                animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1);
                animation-iteration-count: infinite;
                animation-direction: alternate;
            }

            .art {
                animation-name: slide-art;
            }

            .code {
                animation-name: slide-code;
            }

            @keyframes slide-art {
                0% {
                    transform: translateX(-160px);
                }
                100% {
                    transform: translateX(160px);
                }
            }

            @keyframes slide-code {
                0% {
                    transform: translateX(160px);
                }
                100% {
                    transform: translateX(-160px);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .word {
                    animation: none;
                }
                .art {
                    transform: translateX(-160px);
                }
                .code {
                    transform: translateX(160px);
                }
            }
        </style>
    </head>
    <body>
        <div class="stage">
            <span class="word art">Art</span>
            <span class="word code">Code</span>
        </div>
    </body>
</html>
