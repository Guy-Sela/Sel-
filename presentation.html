<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Slider</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        html,
        body {
            font-size: 16px;
            background-color: black;
            color: white;
            overflow: hidden;
        }

        .presentation {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* border: solid pink 1vmin; */
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .button-container {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            z-index: 1;
        }

        .chevron {
            padding: 2rem;
            cursor: pointer;
            color: white;
            font-size: 3rem;
        }

        button {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            outline: none;
            font: inherit;
            color: inherit;
            cursor: pointer;
            -webkit-appearance: none;
            /* Safari and Chrome */
            -moz-appearance: none;
            /* Firefox */
            appearance: none;
        }

        #progressContainer {
            position: absolute;
            top: 5%;
            left: 50%;
            width: 80%;
            height: 0.3rem;
            display: flex;
            align-items: center;
            transform: translateX(-50%);
            gap: 0.3rem;
        }

        .slideProgress {
            flex: 1;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s;
        }

        .slideProgress:last-child {
            margin-right: 0;
        }

        .currentSlideProgress {
            background-color: white;
        }

        iframe {
            min-height: 56.5vw;
            max-height: 56.5vw;
            min-width: 100vw;
            max-width: 100vw;
            border: none;
        }
    </style>
</head>

<body>
    <div class="presentation">
        <div id="progressContainer"></div>
        <div class="slides">
            <div class="slide">
                <iframe src="meditativeclocks/clocks/semi-linear_clock/index.html"></iframe>
            </div>
            <div class="slide">
                <h1>Slide 2</h1>
                <p>This is the content for slide 2.</p>
            </div>
            <div class="slide">
                <h1>Slide 3</h1>
                <p>This is the content for slide 3.</p>
            </div>
            <!-- Add more slides as needed -->
        </div>
        <div class="button-container">
            <button id="prevSlide">
                <span class="chevron">&lsaquo;</span>
            </button>
            <button id="nextSlide">
                <span class="chevron">&rsaquo;</span>
            </button>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll(".slide");
        const totalSlides = slides.length;
        let currentSlide = 0;
        let startX = 0;
        let endX = 0;

        document.getElementById("nextSlide").addEventListener("click", () => {
            currentSlide = (currentSlide + 1) % totalSlides;
            moveSlides();
            updateProgressBar();
        });

        document.getElementById("prevSlide").addEventListener("click", () => {
            currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            moveSlides();
            updateProgressBar();
        });

        // Swipe functionality
        document.querySelector('.presentation').addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        document.querySelector('.presentation').addEventListener('touchmove', (e) => {
            endX = e.touches[0].clientX;
        });

        document.querySelector('.presentation').addEventListener('touchend', () => {
            let threshold = 50; // Minimum distance for a swipe to register, you can adjust based on your needs.
            if (startX - endX > threshold) {
                // Detected swipe to left
                currentSlide = (currentSlide + 1) % totalSlides;
            } else if (endX - startX > threshold) {
                // Detected swipe to right
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
            }
            moveSlides();
            updateProgressBar();
        });

        // Create segments for each slide in the progress bar
        const progressContainer = document.getElementById("progressContainer");
        for (let i = 0; i < totalSlides; i++) {
            const slideProgress = document.createElement("div");
            slideProgress.classList.add("slideProgress");
            progressContainer.appendChild(slideProgress);
        }

        function moveSlides() {
            const slidesContainer = document.querySelector(".slides");
            slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function updateProgressBar() {
            // Update progress segments based on the current slide
            const slideProgresses = document.querySelectorAll(".slideProgress");
            slideProgresses.forEach((segment, index) => {
                if (index === currentSlide) {
                    segment.classList.add("currentSlideProgress");
                } else {
                    segment.classList.remove("currentSlideProgress");
                }
            });
        }

        // Initial setup
        moveSlides();
        updateProgressBar();

    </script>

    <!-- <script src="script.js"></script> -->
</body>

</html>
