<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Minute Of Your Life - Opacity Variation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Immersive UI Styles */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
    </style>
</head>
<body>
    <!--
        This version uses two layers:
        A black background and a white foreground layer.
        We simply animate the opacity of the white layer.
    -->
    <div id="base-layer"></div>
    <div id="fade-layer"></div>

    <script>
        /**
         * FULLSCREEN TOGGLE
         * Click anywhere to enter/exit immersive mode.
         */
        document.addEventListener("click", () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.error(`Fullscreen error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        /**
         * CURSOR MANAGEMENT
         * Hide cursor after 2 seconds of inactivity.
         */
        let cursorTimeout;
        document.addEventListener("mousemove", () => {
            document.body.style.cursor = "default";
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => {
                document.body.style.cursor = "none";
            }, 2000);
        });
    </script>
</body>
</html>
